services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wamanager
      POSTGRES_USER: wamanager
      POSTGRES_PASSWORD: wamanager
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wamanager"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://wamanager:wamanager@postgres:5432/wamanager?sslmode=disable
      JWT_SECRET: dev-secret-change-in-production
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
      FRONTEND_URL: http://localhost:3000
      META_PHONE_NUMBER_ID: ""
      META_ACCESS_TOKEN: ""
      META_WABA_ID: ""
      META_APP_ID: ""
      META_APP_SECRET: ""
      META_WEBHOOK_VERIFY_TOKEN: ""
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - backend

volumes:
  pgdata:
